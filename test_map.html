<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>네이버 지도 인증 테스트</title>
    <!-- 여기에 실제 Client ID를 넣었습니다 -->
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=w6wzwq6pjs"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #map { width: 100%; height: 500px; border: 1px solid #ccc; margin-top: 10px; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 8px; border-left: 5px solid #0076f6; }
    </style>
</head>
<body>
    <div class="info">
        <h3>네이버 지도 인증 자가진단</h3>
        <p>1. 이 파일을 브라우저로 직접 여세요. (파일 탐색기에서 더블 클릭)</p>
        <p>2. 지도가 잘 나온다면: <strong>사장님 앱 프로젝트 설정(Referer) 문제</strong>입니다.</p>
        <p>3. 이 파일에서도 인증 실패가 뜬다면: <strong>네이버 클라우드 콘솔의 Client ID나 계정 설정 문제</strong>입니다.</p>
        <p><strong>접속 중인 주소(URI):</strong> <span id="uri">확인 중...</span></p>
    </div>
    <div id="map"></div>
    <script>
        document.getElementById('uri').innerText = window.location.href;
        try {
            var mapOptions = {
                center: new naver.maps.LatLng(37.3595704, 127.105399),
                zoom: 10
            };
            var map = new naver.maps.Map('map', mapOptions);
            console.log("지도 로드 시도 중...");
        } catch (e) {
            alert("스크립트 로드 오류: " + e.message);
        }
    </script>
</body>
</html>
